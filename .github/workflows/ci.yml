name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - zefan-todo-1
      - zefan-todo-2
      - zefan-todo-3
      - zefan-todo-4
      - zefan-todo-7
      - zefan-todo-8
      - zefan-todo-10

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python sources
        run: python -m py_compile main.py src/*.py tests/*.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v
